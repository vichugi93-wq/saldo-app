<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="barGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGrad)"/>

  <!-- Brillo sutil en esquina superior -->
  <ellipse cx="150" cy="120" rx="180" ry="100" fill="#22c55e" opacity="0.04"/>

  <!-- Línea de tendencia (gráfico de línea) con glow -->
  <polyline 
    points="72,340 140,290 210,310 280,220 350,250 440,160" 
    fill="none" 
    stroke="#22c55e" 
    stroke-width="6" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    filter="url(#glow)"
    opacity="0.5"
  />

  <!-- Barras del gráfico -->
  <!-- Barra 1 -->
  <rect x="80" y="290" width="52" height="130" rx="10" fill="url(#barGrad2)" opacity="0.85"/>
  <!-- Barra 2 -->
  <rect x="155" y="240" width="52" height="180" rx="10" fill="url(#barGrad1)" filter="url(#softGlow)"/>
  <!-- Barra 3 -->
  <rect x="230" y="270" width="52" height="150" rx="10" fill="url(#barGrad2)" opacity="0.85"/>
  <!-- Barra 4 -->
  <rect x="305" y="200" width="52" height="220" rx="10" fill="url(#barGrad3)" filter="url(#softGlow)"/>
  <!-- Barra 5 -->
  <rect x="380" y="150" width="52" height="270" rx="10" fill="url(#barGrad1)" filter="url(#softGlow)"/>

  <!-- Línea base -->
  <line x1="64" y1="432" x2="448" y2="432" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

  <!-- Flecha de tendencia arriba a la derecha -->
  <g filter="url(#glow)" transform="translate(340, 95)">
    <circle cx="36" cy="36" r="36" fill="#22c55e" opacity="0.15"/>
    <polyline points="16,52 36,20 56,52" fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="36" y1="20" x2="36" y2="56" stroke="#22c55e" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Símbolo $ en la esquina superior izquierda -->
  <text x="72" y="148" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="72" fill="#22c55e" opacity="0.9" filter="url(#glow)">₲</text>

</svg>
